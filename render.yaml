services:
  - type: web
    name: sandplay-analysis
    runtime: node
    plan: starter
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: sandplay-sessions
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /var/data
      - key: ADMIN_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: OPENAI_MODEL
        value: deepseek-v3.2
      - key: AI_API_STYLE
        value: chat
